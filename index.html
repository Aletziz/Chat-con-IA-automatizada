<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Chat AI · DeepSeek</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: "Segoe UI", sans-serif;
        background: #0f0f0f;
        color: #e0e0e0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .chat-container {
        width: 100%;
        max-width: 700px;
        height: 90vh;
        display: flex;
        flex-direction: column;
        background: #1a1a1a;
        border-radius: 16px;
        overflow: hidden;
        box-shadow: 0 0 40px rgba(0, 180, 255, 0.08);
        border: 1px solid #2a2a2a;
      }

      /* ── Header ── */
      .chat-header {
        padding: 18px 24px;
        background: #141414;
        border-bottom: 1px solid #2a2a2a;
        display: flex;
        align-items: center;
        gap: 12px;
      }

      .header-dot {
        width: 10px;
        height: 10px;
        border-radius: 50%;
        background: #00b4ff;
        box-shadow: 0 0 8px #00b4ff;
        animation: pulse 2s infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.4;
        }
      }

      .chat-header h1 {
        font-size: 16px;
        font-weight: 600;
        letter-spacing: 0.5px;
        color: #f0f0f0;
      }

      .chat-header span {
        font-size: 12px;
        color: #555;
        margin-left: auto;
      }

      /* ── Messages ── */
      .chat-messages {
        flex: 1;
        overflow-y: auto;
        padding: 24px 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
        scrollbar-width: thin;
        scrollbar-color: #2a2a2a transparent;
      }

      .chat-messages::-webkit-scrollbar {
        width: 4px;
      }
      .chat-messages::-webkit-scrollbar-thumb {
        background: #2a2a2a;
        border-radius: 4px;
      }

      .message {
        display: flex;
        flex-direction: column;
        max-width: 78%;
        animation: fadeIn 0.25s ease;
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(6px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .message.user {
        align-self: flex-end;
        align-items: flex-end;
      }
      .message.bot {
        align-self: flex-start;
        align-items: flex-start;
      }

      .bubble {
        padding: 12px 16px;
        border-radius: 14px;
        font-size: 14px;
        line-height: 1.6;
        word-break: break-word;
      }

      .message.user .bubble {
        background: #00b4ff;
        color: #000;
        border-bottom-right-radius: 4px;
      }

      .message.bot .bubble {
        background: #252525;
        color: #ddd;
        border-bottom-left-radius: 4px;
        border: 1px solid #2e2e2e;
      }

      .timestamp {
        font-size: 10px;
        color: #444;
        margin-top: 4px;
        padding: 0 4px;
      }

      /* ── Typing indicator ── */
      .typing-indicator {
        display: none;
        align-self: flex-start;
        background: #252525;
        border: 1px solid #2e2e2e;
        border-radius: 14px;
        border-bottom-left-radius: 4px;
        padding: 12px 18px;
        gap: 5px;
        align-items: center;
      }

      .typing-indicator.visible {
        display: flex;
      }

      .typing-indicator span {
        width: 7px;
        height: 7px;
        background: #555;
        border-radius: 50%;
        animation: bounce 1.2s infinite;
      }

      .typing-indicator span:nth-child(2) {
        animation-delay: 0.2s;
      }
      .typing-indicator span:nth-child(3) {
        animation-delay: 0.4s;
      }

      @keyframes bounce {
        0%,
        80%,
        100% {
          transform: translateY(0);
        }
        40% {
          transform: translateY(-6px);
        }
      }

      /* ── Input area ── */
      .chat-input-area {
        padding: 16px 20px;
        background: #141414;
        border-top: 1px solid #2a2a2a;
        display: flex;
        gap: 10px;
        align-items: flex-end;
      }

      #userInput {
        flex: 1;
        background: #222;
        border: 1px solid #2e2e2e;
        border-radius: 12px;
        color: #e0e0e0;
        font-size: 14px;
        padding: 12px 16px;
        resize: none;
        outline: none;
        max-height: 120px;
        line-height: 1.5;
        transition: border-color 0.2s;
        font-family: inherit;
      }

      #userInput::placeholder {
        color: #444;
      }
      #userInput:focus {
        border-color: #00b4ff44;
      }

      #sendBtn {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        background: #00b4ff;
        border: none;
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        transition:
          background 0.2s,
          transform 0.1s;
      }

      #sendBtn:hover {
        background: #00caff;
      }
      #sendBtn:active {
        transform: scale(0.95);
      }
      #sendBtn:disabled {
        background: #1e3a47;
        cursor: not-allowed;
      }

      #sendBtn svg {
        width: 18px;
        height: 18px;
        fill: #000;
      }

      /* ── Welcome message ── */
      .welcome {
        text-align: center;
        padding: 40px 20px;
        color: #383838;
        font-size: 13px;
        line-height: 1.8;
        user-select: none;
      }

      .welcome .icon {
        font-size: 32px;
        margin-bottom: 10px;
      }
    </style>
  </head>
  <body>
    <div class="chat-container">
      <!-- Header -->
      <div class="chat-header">
        <div class="header-dot"></div>
        <h1>Gemini AI</h1>
        <span>Powered by n8n</span>
      </div>

      <!-- Messages -->
      <div class="chat-messages" id="chatMessages">
        <div class="welcome">
          <div class="icon">✦</div>
          Escribe un mensaje para comenzar la conversación.
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typingIndicator">
          <span></span><span></span><span></span>
        </div>
      </div>

      <!-- Input -->
      <div class="chat-input-area">
        <textarea
          id="userInput"
          rows="1"
          placeholder="Escribe un mensaje..."
        ></textarea>
        <button id="sendBtn" title="Enviar">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z" />
          </svg>
        </button>
      </div>
    </div>

    <script>
      // ─────────────────────────────────────────────────────────────────
      //  CONFIGURACIÓN
      //  URL del webhook de tu flujo en n8n (Chat Trigger)
      // ─────────────────────────────────────────────────────────────────
      const N8N_WEBHOOK_URL =
        "https://aletzi.app.n8n.cloud/webhook/6cfa713c-0ec3-4405-a205-d040a5d7f232/chat";

      // ─────────────────────────────────────────────────────────────────
      //  SESSION ID — se genera una vez por pestaña abierta.
      //  Sirve para que n8n (Window Buffer Memory) recuerde el historial.
      // ─────────────────────────────────────────────────────────────────
      const SESSION_ID =
        "session_" + Math.random().toString(36).slice(2) + Date.now();

      // ─────────────────────────────────────────────────────────────────

      const chatMessages = document.getElementById("chatMessages");
      const userInput = document.getElementById("userInput");
      const sendBtn = document.getElementById("sendBtn");
      const typingIndicator = document.getElementById("typingIndicator");

      /* Auto-resize del textarea */
      userInput.addEventListener("input", () => {
        userInput.style.height = "auto";
        userInput.style.height = Math.min(userInput.scrollHeight, 120) + "px";
      });

      /* Enviar con Enter (Shift+Enter = salto de línea) */
      userInput.addEventListener("keydown", (e) => {
        if (e.key === "Enter" && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      });

      sendBtn.addEventListener("click", sendMessage);

      /* ── Hora actual ── */
      function getTime() {
        return new Date().toLocaleTimeString("es-ES", {
          hour: "2-digit",
          minute: "2-digit",
        });
      }

      /* ── Renderizar texto con saltos de línea ── */
      function renderText(bubble, text) {
        // Convierte \n en <br> para respetar formato de la IA
        bubble.innerHTML = text
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/\n/g, "<br>");
      }

      /* ── Añadir mensaje al chat ── */
      function addMessage(role, text) {
        const welcome = chatMessages.querySelector(".welcome");
        if (welcome) welcome.remove();

        const msg = document.createElement("div");
        msg.classList.add("message", role);

        const bubble = document.createElement("div");
        bubble.classList.add("bubble");
        renderText(bubble, text);

        const ts = document.createElement("span");
        ts.classList.add("timestamp");
        ts.textContent = getTime();

        msg.appendChild(bubble);
        msg.appendChild(ts);

        chatMessages.insertBefore(msg, typingIndicator);
        scrollToBottom();
      }

      /* ── Scroll al fondo ── */
      function scrollToBottom() {
        chatMessages.scrollTop = chatMessages.scrollHeight;
      }

      /* ── Mostrar / ocultar typing ── */
      function showTyping() {
        typingIndicator.classList.add("visible");
        scrollToBottom();
      }
      function hideTyping() {
        typingIndicator.classList.remove("visible");
      }

      /* ── Enviar mensaje ── */
      async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = "";
        userInput.style.height = "auto";

        addMessage("user", text);
        sendBtn.disabled = true;
        showTyping();

        try {
          const response = await fetch(N8N_WEBHOOK_URL, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
            },
            // n8n Chat Trigger espera: chatInput + sessionId
            body: JSON.stringify({
              chatInput: text,
              sessionId: SESSION_ID,
            }),
          });

          if (!response.ok) {
            const errBody = await response.text().catch(() => "");
            throw new Error(
              `HTTP ${response.status} – ${errBody || response.statusText}`,
            );
          }

          const raw = await response.text();
          let data;
          try {
            data = JSON.parse(raw);
          } catch {
            // Si n8n devuelve texto plano
            data = raw;
          }

          // n8n AI Agent devuelve { output: "..." }
          const botReply =
            (typeof data === "object"
              ? data.output || data.reply || data.text || data.message
              : null) ||
            (typeof data === "string" ? data : JSON.stringify(data, null, 2));

          hideTyping();
          addMessage("bot", botReply);
        } catch (err) {
          hideTyping();
          addMessage("bot", `⚠️ No se pudo conectar con n8n.\n${err.message}`);
          console.error(err);
        }

        sendBtn.disabled = false;
        userInput.focus();
      }
    </script>
  </body>
</html>
